name: property_assistant
description: AI Property Assistant — Egypt real estate mobile app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  connectivity_plus: ^6.1.4
  dio: ^5.8.0+1
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  freezed_annotation: ^2.4.4
  get_it: ^8.0.3
  go_router: ^14.8.1
  injectable: ^2.5.0
  intl: any
  json_annotation: ^4.9.0
  retrofit: 4.4.2
  uuid: ^4.5.1
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^7.0.1

dev_dependencies:
  build_runner: ^2.4.15
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  freezed: ^2.5.8
  injectable_generator: ^2.7.0
  json_serializable: ^6.9.5
  mocktail: ^1.0.4
  retrofit_generator: 9.1.9

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
